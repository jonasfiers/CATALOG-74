services:
  neo4j-dev:
    image: neo4j:latest
    container_name: splitty_neo4j_dev
    restart: unless-stopped
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER}/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_dev_data:/data

volumes:
  neo4j_dev_data:
