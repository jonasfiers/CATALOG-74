services:

  # api-cobol -- Node/Express adapter over the flat files, plus the
  # compiled COBOL batch programs it shells out to. The data volume
  # below is the "DASD": flat files that persist across restarts and
  # are seeded from cobol/seed-data on first boot (see
  # api-cobol/docker-entrypoint.sh).
  api:
    build:
      context: .
      dockerfile: api-cobol/Dockerfile
    image: catalog74_api:latest
    container_name: catalog74_api
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - BATCH_INTERVAL_MS=${BATCH_INTERVAL_MS:-86400000}
    volumes:
      - catalog74_data:/data
    networks:
      - catalog74-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Web Service
  web:
    build:
      context: ./web
    image: catalog74_web:latest
    container_name: catalog74_web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - catalog74-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:80/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  catalog74-network:
    name: catalog74-network
    driver: bridge

volumes:
  catalog74_data:
