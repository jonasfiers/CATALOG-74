limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 1. PROXY API REQUESTS TO THE BACKEND CONTAINER
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 2. SERVE INDEX.HTML WITH NO CACHE
    location = /index.html {
        add_header Cache-Control "no-cache" always;
    }

    # 3. SERVICE WORKER FILES — never cache (no-store prevents CDN/Cloudflare caching)
    location ~* ^/(sw\.js|registerSW\.js)$ {
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
    }

    # 4. SERVE WEBMANIFEST CORRECTLY
    location = /manifest.webmanifest {
        default_type application/manifest+json;
        try_files $uri =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header CDN-Cache-Control "no-store" always;
    }

    # 5. SERVE STATIC ASSETS
    # Hashed assets (in /assets/) are safe to cache forever
    location ~* ^/assets/.*\.(png|jpg|jpeg|gif|ico|svg|woff|woff2|js|css)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Root-level assets (icons, registerSW.js, etc.) — short cache
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|js|css)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800" always;
    }

    # 6. FALLBACK FOR SPA (React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }
}